codecov:
  notify:
    wait_for_ci: false

coverage:
  precision: 2
  round: down

  status:
    project:
      default:
        target: 90%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 95%

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: false
